<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SafeRun Admin Pro</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* VARIABLES */

:root{

--orange:#ff6b00;
--dark:#111827;
--light:#f5f7fa;
--success:#27ae60;
--danger:#e74c3c;
--gray:#777;

}

/* RESET */

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:Segoe UI;
background:var(--light);

}

/* LAYOUT */

.admin{

display:flex;
height:100vh;

}

/* SIDEBAR */

.sidebar{

width:260px;
background:var(--dark);
color:white;
display:flex;
flex-direction:column;

}

.logo{

padding:25px;
font-size:22px;
font-weight:bold;

}

.logo span{

color:var(--orange);

}

.menu{

flex:1;

}

.menu-item{

padding:15px 25px;
display:flex;
gap:12px;
cursor:pointer;
align-items:center;
opacity:0.8;

}

.menu-item:hover{

background:#1f2937;
opacity:1;

}

/* MAIN */

.main{

flex:1;
display:flex;
flex-direction:column;

}

/* TOPBAR */

.topbar{

height:65px;
background:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);

}

.search{

background:#f3f3f3;
padding:8px 15px;
border-radius:20px;

}

/* CONTENT */

.content{

padding:30px;
overflow:auto;

}

/* STATS */

.stats{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;

}

.card{

background:white;
padding:20px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);

}

.card h3{

margin:0;
color:var(--gray);

}

.card h1{

margin:10px 0 0;

}

/* CHART */

.chart{

background:white;
padding:25px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
margin-bottom:30px;

}

/* TABLE */

table{

width:100%;
border-collapse:collapse;
background:white;

}

th,td{

padding:12px;
border-bottom:1px solid #eee;
text-align:left;

}

th{

background:#fafafa;

}

/* STATUS */

.status{

padding:5px 10px;
border-radius:20px;
font-size:12px;

}

.new{

background:#e3f2fd;
color:#1976d2;

}

.delivery{

background:#fff3cd;
color:#856404;

}

.done{

background:#e6f7ee;
color:#27ae60;

}

</style>

</head>

<body>

<div class="admin">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

<span>Safe</span>Run Admin

</div>

<div class="menu">

<div class="menu-item" onclick="openPage('dashboard')">
<i class="fa fa-chart-line"></i>
Dashboard
</div>

<div class="menu-item" onclick="openPage('commandes')">
<i class="fa fa-shopping-cart"></i>
Commandes
</div>

<div class="menu-item" onclick="openPage('chat')">
<i class="fa fa-comments"></i>
Chat Client
</div>

<div class="menu-item">
<i class="fa fa-box"></i>
Produits
</div>

<div class="menu-item">
<i class="fa fa-truck"></i>
Livraisons
</div>

<div class="menu-item">
<i class="fa fa-users"></i>
Clients
</div>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<div class="search">

<i class="fa fa-search"></i>
Rechercher commande...

</div>

<div>

<i class="fa fa-bell"></i>

&nbsp;&nbsp;

<i class="fa fa-user-circle"></i>

</div>

</div>

<div class="content">

<!-- DASHBOARD -->

<div id="dashboard">

<div class="stats">

<div class="card">

<h3>Total Commandes</h3>

<h1 id="stat-commandes">0</h1>

</div>

<div class="card">

<h3>Chiffre d'affaires</h3>

<h1 id="stat-ca">0 Ar</h1>

</div>

<div class="card">

<h3>Clients</h3>

<h1>542</h1>

</div>

<div class="card">

<h3>Produits</h3>

<h1>98</h1>

</div>

</div>

<div class="chart">

<canvas id="salesChart"></canvas>

</div>

</div>

<!-- COMMANDES -->

<div id="commandes" style="display:none">

<h2>Liste commandes</h2>

<table>

<thead>

<tr>

<th>ID</th>

<th>Client</th>

<th>Produit</th>

<th>Total</th>

<th>Statut</th>

<th>Action</th>

</tr>

</thead>

<tbody id="commandes-liste">

</tbody>

</table>

</div>

<!-- CHAT -->

<div id="chat" style="display:none">

<h2>Messagerie client</h2>

<div id="chat-area">

Votre système chat existant peut être collé ici.

</div>

</div>

</div>

</div>

</div>

<script>

/* API EXISTANTE */

const API_URL="https://script.google.com/macros/s/AKfycbzVMmVo9wnzWiCQowYZF775QE0nXAkE74pVlmaeP6pkYeGUdfd2tWyvI1hXe_55z7_G/exec"

/* NAVIGATION */

function openPage(page){

document.getElementById("dashboard").style.display="none"
document.getElementById("commandes").style.display="none"
document.getElementById("chat").style.display="none"

document.getElementById(page).style.display="block"

}

/* GRAPH */

const ctx=document.getElementById("salesChart")

new Chart(ctx,{
type:"line",
data:{
labels:["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"],
datasets:[{
label:"Ventes",
data:[120000,150000,90000,200000,170000,240000,300000],
borderColor:"#ff6b00",
backgroundColor:"rgba(255,107,0,0.1)",
fill:true,
tension:0.4
}]
}
})

/* CHARGER COMMANDES */

async function charger(){

const res=await fetch(API_URL+"?action=getCommandes")

const data=await res.json()

let total=0

let html=""

data.reverse().forEach(cmd=>{

total+=Number(cmd["Montant"]||0)

html+=`

<tr>

<td>${cmd["ID"]}</td>

<td>${cmd["Client"]}</td>

<td>${cmd["Produits"]}</td>

<td>${cmd["Montant"]} Ar</td>

<td><span class="status new">${cmd["Statut"]}</span></td>

<td>

<button onclick="modifierStatut('${cmd["ID"]}','SÉRIEUX')">

PAYÉ

</button>

</td>

</tr>

`

})

document.getElementById("commandes-liste").innerHTML=html

document.getElementById("stat-commandes").innerText=data.length

document.getElementById("stat-ca").innerText=total.toLocaleString()+" Ar"

}

/* STATUT */

async function modifierStatut(id,statut){

await fetch(API_URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({

action:"updateStatut",
idCommande:id,
nouveauStatut:statut

})
})

charger()

}

/* INITIALISATION */

charger()

</script>

</body>

</html>
