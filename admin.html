<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeRun Admin OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --orange: #ff6b00; --dark: #0f172a; --bg: #f8fafc;
            --success: #22c55e; --danger: #ef4444; --gray: #64748b;
        }

        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #1e293b; overflow: hidden; }

        /* --- AUTHENTICATION SCREEN --- */
        #auth-screen {
            position: fixed; inset: 0; background: var(--dark); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .auth-card {
            background: white; padding: 40px; border-radius: 20px; width: 350px; text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
        }
        .auth-card input {
            width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 8px; outline: none;
        }
        .auth-card button {
            width: 100%; padding: 12px; background: var(--orange); color: white; border: none; 
            border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        /* --- LAYOUT --- */
        .admin-container { display: none; height: 100vh; }
        .sidebar { width: 260px; background: var(--dark); color: white; display: flex; flex-direction: column; }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* --- SIDEBAR --- */
        .nav-link {
            padding: 15px 25px; display: flex; align-items: center; gap: 12px; color: #94a3b8;
            cursor: pointer; transition: 0.3s; border-left: 4px solid transparent;
        }
        .nav-link.active { background: #1e293b; color: white; border-left-color: var(--orange); }
        .nav-link:hover { color: white; background: #1e293b; }

        /* --- TOPBAR --- */
        .topbar {
            height: 65px; background: white; border-bottom: 1px solid #e2e8f0;
            display: flex; align-items: center; justify-content: space-between; padding: 0 30px;
        }

        /* --- DASHBOARD CARDS --- */
        .content { padding: 30px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .card h3 { font-size: 14px; color: var(--gray); margin: 0; }
        .card h2 { font-size: 24px; margin: 10px 0 0; }

        /* --- CHAT INTERFACE --- */
        .chat-box {
            display: flex; height: calc(100vh - 180px); background: white; border-radius: 12px;
            border: 1px solid #e2e8f0; overflow: hidden;
        }
        .chat-sidebar { width: 280px; border-right: 1px solid #e2e8f0; background: #fcfcfc; overflow-y: auto; }
        .chat-content { flex: 1; display: flex; flex-direction: column; background: #f1f5f9; }
        .msg-list { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 12px; font-size: 14px; line-height: 1.4; }
        .msg.sent { align-self: flex-end; background: var(--orange); color: white; }
        .msg.received { align-self: flex-start; background: white; border: 1px solid #e2e8f0; }
        .chat-input { padding: 15px; background: white; display: flex; gap: 10px; border-top: 1px solid #e2e8f0; }
        .chat-input input { flex: 1; border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; outline: none; }

        /* --- TABLES --- */
        table { width: 100%; border-collapse: collapse; background: white; }
        th { text-align: left; padding: 15px; background: #f8fafc; border-bottom: 2px solid #e2e8f0; font-size: 13px; color: var(--gray); }
        td { padding: 15px; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .badge.success { background: #dcfce7; color: #166534; }
        .badge.warning { background: #fef9c3; color: #854d0e; }

        /* --- NOTIFICATIONS --- */
        .dot { height: 10px; width: 10px; background: var(--danger); border-radius: 50%; display: inline-block; margin-left: auto; display: none; }
        /* Ajoute ceci pour gérer spécifiquement le statut SÉRIEUX avec le même vert que success */
        .badge.serieux { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <div style="font-size: 40px; color: var(--orange); margin-bottom: 15px;"><i class="fas fa-shield-halved"></i></div>
        <h2 style="margin:0 0 20px;">SafeRun Login</h2>
        <input type="text" id="admin-user" placeholder="Nom d'utilisateur">
        <input type="password" id="admin-pass" placeholder="Mot de passe">
        <button onclick="login()">SE CONNECTER</button>
        <p id="auth-err" style="color:var(--danger); font-size: 13px; margin-top: 15px; display: none;">Identifiants incorrects</p>
    </div>
</div>

<div class="admin-container" id="admin-panel">
    <aside class="sidebar">
        <div style="padding: 25px; font-size: 20px; font-weight: bold; border-bottom: 1px solid #1e293b;">
            <span style="color:var(--orange)">Safe</span>Run Admin
        </div>
        <nav style="flex:1; padding-top: 20px;">
            <div class="nav-link active" onclick="showTab('tab-dash', this)"><i class="fas fa-chart-line"></i> Dashboard</div>
            <div class="nav-link" onclick="showTab('tab-orders', this)"><i class="fas fa-shopping-bag"></i> Commandes</div>
            <div class="nav-link" onclick="showTab('tab-chat', this)">
                <i class="fas fa-comment-alt"></i> Chat Client <span id="chat-notif" class="dot"></span>
            </div>
        </nav>
        <div style="padding: 20px;">
            <button onclick="logout()" style="width: 100%; background: #1e293b; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer;">
                <i class="fas fa-sign-out-alt"></i> Quitter
            </button>
        </div>
    </aside>

    <main class="main">
        <header class="topbar">
            <h3 id="view-title">Dashboard</h3>
            <div style="display:flex; align-items:center; gap:15px;">
                <button onclick="refreshAll()" style="background:none; border:none; cursor:pointer;"><i class="fas fa-sync-alt"></i></button>
                <div style="height: 35px; width: 35px; background: var(--orange); border-radius: 50%; display:flex; justify-content:center; align-items:center; color:white; font-weight:bold;">A</div>
            </div>
        </header>

        <div class="content">
            <div id="tab-dash" class="tab-content">
                <div class="grid">
                    <div class="card"><h3>Ventes Totales</h3><h2 id="dash-ca">0 Ar</h2></div>
                    <div class="card"><h3>Commandes</h3><h2 id="dash-count">0</h2></div>
                    <div class="card"><h3>Nouveaux Clients</h3><h2>12</h2></div>
                </div>
                <div class="card" style="height: 350px;">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>

            <div id="tab-orders" class="tab-content" style="display:none;">
                <div class="card">
                    <table>
                        <thead>
                            <tr><th>ID</th><th>Client</th><th>Montant</th><th>Statut</th><th>Action</th></tr>
                        </thead>
                        <tbody id="order-rows"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-chat" class="tab-content" style="display:none;">
                <div class="chat-box">
                    <div class="chat-sidebar" id="client-list"></div>
                    <div class="chat-content">
                        <div id="chat-header" style="padding:15px; background:white; font-weight:bold; border-bottom:1px solid #e2e8f0;">Sélectionnez un client</div>
                        <div class="msg-list" id="msg-container"></div>
                        <div class="chat-input" id="input-zone" style="display:none;">
                            <input type="text" id="chat-input-field" placeholder="Répondre au client...">
                            <button onclick="sendMessage()" style="background:var(--orange); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<script>
    const CONFIG = {
        API: "https://script.google.com/macros/s/AKfycbzVMmVo9wnzWiCQowYZF775QE0nXAkE74pVlmaeP6pkYeGUdfd2tWyvI1hXe_55z7_G/exec",
        USER: "admin",
        PASS: "1234"
    };

    let activeClient = null;
    let totalMessages = 0;
    let isLocked = false;

    // --- AUTHENTICATION ---
    function login() {
        const u = document.getElementById('admin-user').value;
        const p = document.getElementById('admin-pass').value;
        if(u === CONFIG.USER && p === CONFIG.PASS) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'flex';
            initDashboard();
            startSync();
        } else {
            document.getElementById('auth-err').style.display = 'block';
        }
    }

    function logout() { location.reload(); }

    // --- NAVIGATION ---
    function showTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        el.classList.add('active');
        document.getElementById('view-title').innerText = el.innerText;
        if(id === 'tab-chat') document.getElementById('chat-notif').style.display = 'none';
    }

    // --- DASHBOARD ---
    let salesChart;
    function initDashboard() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        salesChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'],
                datasets: [{ label: 'Ventes Ar', data: [0,0,0,0,0,0,0], borderColor: '#ff6b00', tension: 0.4, fill: true, backgroundColor: 'rgba(255, 107, 0, 0.1)' }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
        refreshAll();
    }

    // --- DATA SYNC ---
    async function refreshAll() {
        try {
            const res = await fetch(CONFIG.API + "?action=getCommandes");
            const data = await res.json();
            let total = 0;
            let rows = "";

            data.reverse().forEach(cmd => {
                total += Number(cmd.Montant || 0);
                
                // Définition de la couleur du badge : Vert pour SÉRIEUX ou PAYÉ, Jaune pour le reste
                const isValide = (cmd.Statut === "SÉRIEUX" || cmd.Statut === "PAYÉ");
                const badgeClass = isValide ? "success" : "warning";

                rows += `<tr>
                    <td>#${cmd.ID}</td>
                    <td><strong>${cmd.Client}</strong></td>
                    <td>${Number(cmd.Montant).toLocaleString()} Ar</td>
                    <td><span class="badge ${badgeClass}">${cmd.Statut}</span></td>
                    <td>
                        ${!isValide ? 
                            `<button onclick="updateStatus('${cmd.ID}')" style="cursor:pointer; background:var(--orange); color:white; border:none; padding:6px 12px; border-radius:6px; font-weight:bold;">OK</button>` : 
                            `<i class="fas fa-check-circle" style="color:var(--success); font-size:1.2rem;"></i>`
                        }
                    </td>
                </tr>`;
            });

            document.getElementById('order-rows').innerHTML = rows;
            document.getElementById('dash-ca').innerText = total.toLocaleString() + " Ar";
            document.getElementById('dash-count').innerText = data.length;
            
            salesChart.data.datasets[0].data = [total/5, total/3, total/6, total/2, total/4, total/5, total/1.5];
            salesChart.update();
        } catch(e) { console.error(e); }
    }

    // --- CHAT SYSTEM ---
    async function syncChat() {
    if(isLocked) return;
    isLocked = true;
    try {
        const res = await fetch(CONFIG.API + "?action=readAllChat");
        const allMsgs = await res.json();

        // Notification sonore
        if(allMsgs.length > totalMessages && totalMessages !== 0) {
            document.getElementById('alert-sound').play();
            if(document.getElementById('tab-chat').style.display === 'none') {
                document.getElementById('chat-notif').style.display = 'inline-block';
            }
        }
        totalMessages = allMsgs.length;

        // --- CORRECTION ICI : m.idClient au lieu de m.ID_Client ---
        const clients = [...new Set(allMsgs.map(m => m.idClient))];
        let clientListHtml = "";
        clients.forEach(c => {
            if(!c) return; 
            const isSelected = (activeClient === c);
            clientListHtml += `<div onclick="loadDiscussion('${c}')" style="padding:15px; border-bottom:1px solid #e2e8f0; cursor:pointer; background:${isSelected?'#fff7ed':'white'}; font-weight:${isSelected?'bold':'normal'}; border-left:${isSelected?'4px solid var(--orange)':'none'}">
                <i class="fas fa-user-circle"></i> ${c}
            </div>`;
        });
        document.getElementById('client-list').innerHTML = clientListHtml;

        // Affichage de la discussion
        if(activeClient) {
            // --- CORRECTION ICI : m.idClient ---
            const filtered = allMsgs.filter(m => m.idClient === activeClient);
            let msgHtml = "";
            filtered.forEach(m => {
                // --- CORRECTION ICI : m.message et m.expediteur (minuscules) ---
                const texte = m.message || "";
                const exp = m.expediteur || "";
                
                const side = exp === "Admin" ? "sent" : "received";
                if(texte) {
                    msgHtml += `<div class="msg ${side}">${texte}</div>`;
                }
            });
            const container = document.getElementById('msg-container');
            container.innerHTML = msgHtml;
            container.scrollTop = container.scrollHeight;
        }
    } catch(e) {
        console.error("Erreur d'affichage :", e);
    } finally { 
        isLocked = false; 
    }
}

    function loadDiscussion(id) {
        activeClient = id;
        document.getElementById('chat-header').innerText = "Client: " + id;
        document.getElementById('input-zone').style.display = 'flex';
        syncChat();
    }

    async function sendMessage() {
    const input = document.getElementById('chat-input-field');
    const val = input.value.trim();

    if(!val || !activeClient) return;

    input.disabled = true;

    try {
        await fetch(CONFIG.API, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
                action: "sendChatMessage",
                idClient: activeClient,
                message: val,
                expediteur: "Admin"
            })
        });

        input.value = "";
    } catch (e) {
        console.error("Erreur d'envoi :", e);
    } finally {
        input.disabled = false;
        input.focus();
        syncChat();
    }
}

   async function updateStatus(id) {
    // Demande de confirmation
    if(!confirm("Valider la commande #" + id + " en statut SÉRIEUX ?")) return;

    try {
        await fetch(CONFIG.API, { 
            method: "POST", 
            mode: "no-cors", 
            body: JSON.stringify({ 
                action: "updateStatut", 
                idCommande: id, 
                nouveauStatut: "SÉRIEUX" 
            }) 
        });
        
        // Rafraîchissement automatique après la mise à jour
        setTimeout(refreshAll, 500);
    } catch(e) {
        console.error("Erreur de mise à jour:", e);
        alert("Erreur lors de la validation.");
    }
}

    function startSync() {
        setInterval(syncChat, 3000);
    }
</script>
</body>
</html>
